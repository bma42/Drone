<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mobile Fix iOS</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: pan-y;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            overflow-y: auto;
            font-family: -apple-system, system-ui, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
        }

        .main-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding: 20px;
        }

        .item {
            width: 100%;
            height: 150px;
            background: #2c2c2e;
            border-radius: 15px;
            flex-shrink: 0;
        }

        .hero {
            width: 100%;
            height: 300px;
            background: linear-gradient(135deg, #007AFF, #5856D6);
            border-radius: 20px;
        }

        input {
            font-size: 16px; 
            padding: 12px;
            border-radius: 8px;
            border: none;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="hero"></div>
        <input type="text" placeholder="Focus sans zoom auto...">
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
    </div>

    <script>
        document.addEventListener('touchstart', (event) => {
            if (event.touches.length > 1) {
                event.preventDefault();
            }
        }, { passive: false });

        let lastTouch = 0;
        document.addEventListener('touchend', (event) => {
            const now = Date.now();
            if (now - lastTouch <= 300) {
                event.preventDefault();
            }
            lastTouch = now;
        }, false);

        document.addEventListener('gesturestart', (event) => {
            event.preventDefault();
        });
    </script>
</body>
</html>
