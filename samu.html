<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expert FINESS - Drone Police</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #0f172a; }
        #map { height: 100%; width: 100%; }
        .control-panel {
            position: absolute; top: 10px; right: 10px; z-index: 1000;
            background: white; padding: 10px; border-radius: 4px; width: 200px;
        }
        button {
            width: 100%; padding: 8px; background: #002244; color: white;
            border: none; cursor: pointer; font-weight: bold;
        }
        #info { font-size: 11px; margin-top: 5px; color: #334155; }
    </style>
</head>
<body>

<div class="control-panel">
    <button onclick="searchFINESS()">Charger FINESS</button>
    <div id="info">Zoomez sur une ville puis cliquez.</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map').setView([48.8566, 2.3522], 12);
    const layerGroup = L.layerGroup().addTo(map);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    async function searchFINESS() {
        const info = document.getElementById('info');
        const b = map.getBounds();
        const coords = `${b.getSouth()},${b.getWest()},${b.getNorth()},${b.getEast()}`;
        
        info.innerText = "Interrogation FINESS...";
        layerGroup.clearLayers();

        const dataset = "finess-france-etablissements-sanitaires-et-sociaux";
        const query = "(cat_etab:124 OR cat_etab:125 OR cat_etab:101)";
        const url = `https://public.opendatasoft.com/api/records/1.0/search/?dataset=${dataset}&q=${query}&geofilter.bbox=${coords}&rows=100`;

        try {
            const response = await fetch(url);
            const data = await response.json();

            if (!data.records.length) {
                info.innerText = "Aucun établissement trouvé.";
                return;
            }

            data.records.forEach(record => {
                const fields = record.fields;
                if (!fields.geolocalisation) return;

                const marker = L.circleMarker([fields.geolocalisation[0], fields.geolocalisation[1]], {
                    radius: 7,
                    fillColor: getColor(fields.cat_etab),
                    color: "#fff",
                    weight: 1,
                    fillOpacity: 0.9
                });

                marker.bindPopup(`
                    <div style="font-size:12px">
                        <strong>${fields.raison_sociale}</strong><br>
                        <b>Type:</b> ${fields.libelle_categorie_etablissement}<br>
                        <b>Ville:</b> ${fields.libelle_commune}<br>
                        <b>FINESS:</b> ${fields.num_finess_etablissement}
                    </div>
                `);
                layerGroup.addLayer(marker);
            });

            info.innerText = `${data.records.length} établissements FINESS.`;
        } catch (e) {
            info.innerText = "Erreur de chargement.";
        }
    }

    function getColor(cat) {
        if (cat == '124') return '#ef4444'; // SAMU : Rouge
        if (cat == '125') return '#f59e0b'; // SMUR : Orange
        return '#3b82f6'; // Centres Hospitaux : Bleu
    }
</script>

</body>
</html>
