<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carte 3D Sans Clé API</title>
    <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body { margin: 0; padding: 0; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
    </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

<script>
    const map = new maplibregl.Map({
        container: 'map',
        // Utilisation d'un style open-source hébergé sans authentification forcée
        style: 'https://demotiles.maplibre.org/style.json', 
        center: [2.3522, 48.8566],
        zoom: 15,
        pitch: 45,
        bearing: -10
    });

    const geolocate = new maplibregl.GeolocateControl({
        positionOptions: { enableHighAccuracy: true },
        trackUserLocation: true,
        showUserHeading: true
    });
    map.addControl(geolocate);

    map.on('load', () => {
        // On ajoute manuellement la source de bâtiments si elle n'est pas dans le style
        // Note: Les "demotiles" de MapLibre sont limitées géographiquement.
        // Pour une couverture mondiale sans clé, on injecte souvent des tuiles OSM via Overpass ou Tilehosting gratuit.
        
        map.addLayer({
            'id': '3d-buildings',
            'source': 'maplibre', // Source par défaut du style demo
            'source-layer': 'building',
            'type': 'fill-extrusion',
            'minzoom': 15,
            'paint': {
                'fill-extrusion-color': '#ccc',
                'fill-extrusion-height': ['get', 'height'],
                'fill-extrusion-base': ['get', 'min_height'],
                'fill-extrusion-opacity': 0.7
            }
        });
    });
</script>
</body>
</html>
