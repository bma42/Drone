<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carte 3D - Retour Vue Défaut</title>
    
    <link href="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #fdfdfd; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        
        /* Style du bouton Reset */
        .reset-button {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 10;
            background: white;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-family: sans-serif;
            font-size: 13px;
            font-weight: bold;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            color: #333;
        }
        .reset-button:hover { background: #f0f0f0; }

        .maplibregl-ctrl-attrib { display: none; }
    </style>
</head>
<body>

<button class="reset-button" onclick="resetView()">RESET VUE</button>
<div id="map"></div>

<script src="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.js"></script>

<script>
    // Variables de configuration par défaut
    const defaultSettings = {
        center: [2.349, 48.856],
        zoom: 16,
        pitch: 70,
        bearing: 0
    };

    const map = new maplibregl.Map({
        container: 'map',
        style: 'https://tiles.openfreemap.org/styles/positron', 
        center: defaultSettings.center,
        zoom: defaultSettings.zoom,
        pitch: defaultSettings.pitch,
        bearing: defaultSettings.bearing,
        antialias: true,
        maxPitch: 85
    });

    // Fonction pour réinitialiser la vue
    function resetView() {
        map.flyTo({
            center: defaultSettings.center,
            zoom: defaultSettings.zoom,
            pitch: defaultSettings.pitch,
            bearing: defaultSettings.bearing,
            essential: true // animation fluide
        });
    }

    map.addControl(new maplibregl.NavigationControl({ visualizePitch: true }), 'top-right');
    map.addControl(new maplibregl.GeolocateControl({
        positionOptions: { enableHighAccuracy: true },
        trackUserLocation: true,
        showUserHeading: true
    }), 'top-right');

    map.on('load', () => {
        if (map.getSource('openmaptiles')) {
            map.getSource('openmaptiles').maxzoom = 22;
        }

        const layers = map.getStyle().layers;
        layers.forEach(layer => {
            if (layer.type !== 'background' && !layer.id.includes('building')) {
                map.setLayoutProperty(layer.id, 'visibility', 'none');
            }
        });

        map.addLayer({
            'id': '3d-buildings-main',
            'source': 'openmaptiles',
            'source-layer': 'building',
            'type': 'fill-extrusion',
            'minzoom': 13,
            'paint': {
                'fill-extrusion-color': '#ffffff',
                'fill-extrusion-height': ['get', 'render_height'],
                'fill-extrusion-base': ['get', 'render_min_height'],
                'fill-extrusion-opacity': 0.85,
                'fill-extrusion-vertical-gradient': true
            }
        });

        map.addLayer({
            'id': 'labels-height-30m',
            'source': 'openmaptiles',
            'source-layer': 'building',
            'type': 'symbol',
            'minzoom': 15.5,
            'filter': ['>=', ['get', 'render_height'], 30],
            'layout': {
                'text-field': ['concat', ['get', 'render_height'], 'm'],
                'text-size': 11,
                'text-font': ['Open Sans Bold', 'Arial Unicode MS Bold'],
                'text-allow-overlap': true,
                'text-ignore-placement': true
            },
            'paint': {
                'text-color': '#444',
                'text-halo-color': 'rgba(255,255,255,0.8)',
                'text-halo-width': 1.5
            }
        });
    });
</script>
</body>
</html>
