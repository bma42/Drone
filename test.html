<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carte 3D Corrigée</title>
    
    <link href="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.css" rel="stylesheet" />
    
    <style>
        /* Correction cruciale : forcer la hauteur des parents */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        #map {
            width: 100%;
            height: 100vh; /* Utilise toute la hauteur de l'écran */
        }
    </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.js"></script>

<script>
    const map = new maplibregl.Map({
        container: 'map',
        style: 'https://tiles.openfreemap.org/styles/bright', // Style gratuit sans clé [2]
        center: [3.8829, 45.0428],
        zoom: 16,
        pitch: 60,
        antialias: true
    });

    // Ajout du bouton de géolocalisation 
    map.addControl(new maplibregl.GeolocateControl({
        positionOptions: { enableHighAccuracy: true },
        trackUserLocation: true
    }), 'top-right');

    map.on('load', () => {
        // Redimensionnement forcé pour corriger les bugs d'affichage initiaux
        map.resize();

        // Ajout de la couche 3D
        const layers = map.getStyle().layers;
        const labelLayerId = layers.find(l => l.type === 'symbol' && l.layout['text-field'])?.id;

        map.addLayer({
            'id': '3d-buildings',
            'source': 'openfreemap',
            'source-layer': 'building',
            'type': 'fill-extrusion',
            'minzoom': 15,
            'paint': {
                'fill-extrusion-color': '#e0e0e0',
                'fill-extrusion-height': ['get', 'render_height'],
                'fill-extrusion-base': ['get', 'render_min_height'],
                'fill-extrusion-opacity': 0.8
            }
        }, labelLayerId);
    });

    // Vérification des erreurs en console
    map.on('error', (e) => {
        console.error("Erreur de carte :", e.error);
    });
</script>
</body>
</html>
