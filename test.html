<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoom Extrême 3D - OpenFreeMap</title>
    <link href="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #ffffff; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        .ui-overlay { position: absolute; top: 10px; left: 10px; z-index: 10; display: flex; gap: 5px; }
        button { 
            background: white; border: none; padding: 8px 12px; border-radius: 4px; 
            font-weight: bold; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.2); 
        }
    </style>
</head>
<body>

<div class="ui-overlay">
    <button onclick="resetView()">VUE DÉFAUT</button>
</div>
<div id="map"></div>

<script src="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.js"></script>

<script>
    const map = new maplibregl.Map({
        container: 'map',
        style: 'https://tiles.openfreemap.org/styles/positron', 
        center: [2.349, 48.856],
        zoom: 18.5,        // Zoom de départ déjà très proche
        pitch: 75,
        bearing: -10,
        antialias: true,
        maxZoom: 24,       // Autorise un zoom massif
        maxPitch: 85
    });

    function resetView() {
        map.flyTo({ center: [2.349, 48.856], zoom: 18.5, pitch: 75, bearing: -10 });
    }

    map.addControl(new maplibregl.NavigationControl(), 'top-right');
    map.addControl(new maplibregl.GeolocateControl({ trackUserLocation: true, showUserHeading: true }), 'top-right');

    map.on('style.load', () => {
        // --- 1. DÉVERROUILLAGE DE LA SOURCE ---
        // On force la source à croire qu'elle peut monter au zoom 24 (overscaling)
        const source = map.getSource('openmaptiles');
        if (source) {
            source.maxzoom = 24; 
        }

        // --- 2. DÉVERROUILLAGE DES COUCHES ---
        // On parcourt toutes les couches du style Positron pour supprimer les limites de zoom
        const layers = map.getStyle().layers;
        layers.forEach(layer => {
            // Supprime les limites de zoom qui font disparaître les objets
            if (map.getLayer(layer.id)) {
                map.setLayerZoomRange(layer.id, 0, 24);
            }

            // Minimalisme : on cache tout ce qui n'est pas sol ou bâtiment
            const isEssential = layer.id.includes('building') || layer.type === 'background' || layer.id.includes('park');
            if (!isEssential) {
                map.setLayoutProperty(layer.id, 'visibility', 'none');
            }
        });

        // --- 3. RE-CRÉATION DE LA COUCHE 3D (Pour être sûr qu'elle domine) ---
        // On supprime l'ancienne si elle existe pour injecter la nôtre sans limites
        if (map.getLayer('3d-buildings')) map.removeLayer('3d-buildings');

        map.addLayer({
            'id': '3d-buildings-extreme',
            'source': 'openmaptiles',
            'source-layer': 'building',
            'type': 'fill-extrusion',
            'minzoom': 13,
            'maxzoom': 24, // Indispensable ici aussi
            'paint': {
                'fill-extrusion-color': '#ffffff',
                'fill-extrusion-height': ['coalesce', ['get', 'render_height'], ['get', 'height'], 15],
                'fill-extrusion-base': ['coalesce', ['get', 'render_min_height'], ['get', 'min_height'], 0],
                'fill-extrusion-opacity': 0.9,
                'fill-extrusion-vertical-gradient': true
            }
        });

        // --- 4. ÉTIQUETTES DE HAUTEUR (> 30m) ---
        map.addLayer({
            'id': 'labels-30m',
            'source': 'openmaptiles',
            'source-layer': 'building',
            'type': 'symbol',
            'minzoom': 16,
            'filter': ['>=', ['coalesce', ['get', 'render_height'], ['get', 'height'], 0], 30],
            'layout': {
                'text-field': ['concat', ['coalesce', ['get', 'render_height'], ['get', 'height']], ' m'],
                'text-size': 14,
                'text-font': ['Open Sans Bold'],
                'text-allow-overlap': true,
                'text-ignore-placement': true,
                'text-anchor': 'bottom'
            },
            'paint': {
                'text-color': '#000',
                'text-halo-color': '#fff',
                'text-halo-width': 2
            }
        });
    });

    // Correction finale : forcer l'overscaling à chaque mouvement
    map.on('sourcedata', () => {
        const s = map.getSource('openmaptiles');
        if (s && s.maxzoom < 24) s.maxzoom = 24;
    });
</script>
</body>
</html>
