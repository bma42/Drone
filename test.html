<!DOCTYPE html>

<html>

<head>

<meta charset="utf-8"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<title>Photon Autocomplete</title>

<style>

body { font-family: sans-serif; padding: 20px; }
#results { border: 1px solid #ccc; max-width: 500px; margin-top: 5px; }
.item { padding: 8px; cursor: pointer; }
.item:hover { background: #eee; }
#map { height: 400px; margin-top: 10px; }

</style>

</head>

<body>

<input id="search" placeholder="Rechercher une rue..." />

<div id="results"></div>
<div id="map"></div>

<script>

const input = document.getElementById("search");
const results = document.getElementById("results");

const map = L.map('map').setView([48.8566, 2.3522], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
}).addTo(map);

let selectedPoints = [];
let polyline = null;

let timer = null;

input.addEventListener("input", () => {

    clearTimeout(timer);

    const q = input.value;

    if (q.length < 3) {

        results.innerHTML = "";

        return;

    }

    timer = setTimeout(async () => {

        const url = `https://photon.komoot.io/api/?q=${encodeURIComponent(q)}&limit=8&lat=48.8566&lon=2.3522`;

        const res = await fetch(url);

        const data = await res.json();

        results.innerHTML = "";

        data.features.forEach(feature => {

            const p = feature.properties;

            const div = document.createElement("div");

            div.className = "item";

            div.textContent =

                (p.name || "") +

                (p.street ? " - " + p.street : "") +

                (p.city ? " - " + p.city : "");

            div.onclick = () => {

                input.value = p.name || "";
                results.innerHTML = "";

                if (feature.geometry && feature.geometry.coordinates) {

                    const lon = feature.geometry.coordinates[0];
                    const lat = feature.geometry.coordinates[1];

                    selectedPoints.push([lat, lon]);

                    L.marker([lat, lon]).addTo(map);

                    map.setView([lat, lon], 15);

                    if (selectedPoints.length === 2) {

                        if (polyline) {
                            map.removeLayer(polyline);
                        }

                        polyline = L.polyline(selectedPoints, {color: 'blue'}).addTo(map);

                        selectedPoints = [];
                    }
                }

                console.log("Sélection :", feature);
            };

            results.appendChild(div);

        });

    }, 250);

});

</script>

</body>

</html>
