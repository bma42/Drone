<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carte 3D Gratuite</title>
    <!-- MapLibre SDK -->
    <script src="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body { margin: 0; padding: 0; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
    </style>
</head>
<body>

<div id="map"></div>

<script>
    const map = new maplibregl.Map({
        container: 'map',
        // Style gratuit via OpenFreeMap (pas de clé API requise)
        style: 'https://tiles.openfreemap.org/styles/bright', 
        center: [2.3522, 48.8566], // Paris
        zoom: 15.5,
        pitch: 45, // Inclinaison pour voir la 3D
        bearing: -17
    });

    map.on('load', () => {
        // Ajout de la couche 3D (Extrusion des bâtiments)
        map.addLayer({
            'id': '3d-buildings',
            'source': 'openfreemap', // Source de données vectorielles
            'source-layer': 'building',
            'type': 'fill-extrusion',
            'minzoom': 15,
            'paint': {
                // Couleur grise sans texture
                'fill-extrusion-color': '#aaa',
                // Récupère la hauteur via les données OSM
                'fill-extrusion-height': ['get', 'height'],
                'fill-extrusion-base': ['get', 'min_height'],
                'fill-extrusion-opacity': 0.8
            }
        });

        // Ajout du bouton de géolocalisation
        map.addControl(
            new maplibregl.GeolocateControl({
                positionOptions: { enableHighAccuracy: true },
                trackUserLocation: true,
                showUserLocation: true
            })
        );
        
        // Ajout des contrôles de navigation (zoom/rotation)
        map.addControl(new maplibregl.NavigationControl());
    });
</script>

</body>
</html>
