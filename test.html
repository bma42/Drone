<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesure de Hauteur 3D</title>
    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body { margin: 0; padding: 0; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
    </style>
</head>
<body>
<div id="map"></div>
<script>
    const map = new maplibregl.Map({
        container: 'map',
        style: 'https://tiles.openfreemap.org/styles/liberty', 
        center: [2.342, 48.882], // Montmartre (pour voir des variations)
        zoom: 17,
        pitch: 60,
        antialias: true
    });

    map.addControl(new maplibregl.GeolocateControl({trackUserLocation: true}));

    map.on('load', () => {
        // 1. La couche 3D
        map.addLayer({
            'id': '3d-buildings',
            'source': 'openmaptiles',
            'source-layer': 'building',
            'type': 'fill-extrusion',
            'paint': {
                'fill-extrusion-color': '#aaa',
                'fill-extrusion-height': ['get', 'render_height'],
                'fill-extrusion-base': ['get', 'render_min_height'],
                'fill-extrusion-opacity': 0.6
            }
        });

        // 2. L'affichage des étiquettes de hauteur
        map.addLayer({
            'id': 'building-height-labels',
            'source': 'openmaptiles',
            'source-layer': 'building',
            'type': 'symbol',
            'minzoom': 17, // N'affiche les chiffres que si on est très proche
            'layout': {
                'text-field': ['concat', ['get', 'render_height'], ' m'],
                'text-font': ['Noto Sans Regular'],
                'text-size': 12
            },
            'paint': {
                'text-color': '#000000',
                'text-halo-color': '#ffffff',
                'text-halo-width': 1
            }
        });
    });

    // 3. Mesurer au clic
    map.on('click', '3d-buildings', (e) => {
        const height = e.features[0].properties.render_height;
        alert("Hauteur estimée de ce bâtiment : " + height + " mètres");
    });

    // Curseur pointer sur les bâtiments
    map.on('mouseenter', '3d-buildings', () => { map.getCanvas().style.cursor = 'pointer'; });
    map.on('mouseleave', '3d-buildings', () => { map.getCanvas().style.cursor = ''; });
</script>
</body>
</html>
