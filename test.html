<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carte 3D Minimaliste</title>
    <link href="maplibre-gl.css" rel="stylesheet" />
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #f2f2f2; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
    </style>
</head>
<body>

<div id="map"></div>

<script src="maplibre-gl.js"></script>

<script>
    const map = new maplibregl.Map({
        container: 'map',
        // Style de base très clair
        style: 'https://tiles.openfreemap.org/styles/positron', 
        center: [2.349, 48.856],
        zoom: 16,
        pitch: 75, // Inclinaison forte par défaut
        bearing: 0,
        antialias: true,
        maxPitch: 85, // Autorise une vue presque à l'horizontale (profil)
        dragRotate: true
    });

    map.addControl(new maplibregl.NavigationControl(), 'top-right');

    map.on('load', () => {
        
        // --- ÉTAPE 1 : Épuration du style pour le minimalisme ---
        const layers = map.getStyle().layers;
        layers.forEach(layer => {
            // On cache tout sauf ce qui est lié aux bâtiments ou au fond
            if (layer.type !== 'background' && !layer.id.includes('building')) {
                map.setLayoutProperty(layer.id, 'visibility', 'none');
            }
        });

        // --- ÉTAPE 2 : Ajout des bâtiments extrudés ---
        map.addLayer({
            'id': '3d-buildings',
            'source': 'openmaptiles',
            'source-layer': 'building',
            'type': 'fill-extrusion',
            'minzoom': 13,
            'paint': {
                'fill-extrusion-color': '#ffffff',
                'fill-extrusion-height': ['get', 'render_height'],
                'fill-extrusion-base': ['get', 'render_min_height'],
                'fill-extrusion-opacity': 0.9
            }
        });

        // --- ÉTAPE 3 : Étiquettes de hauteur (uniquement > 30m) ---
        map.addLayer({
            'id': 'building-labels-30m',
            'source': 'openmaptiles',
            'source-layer': 'building',
            'type': 'symbol',
            'minzoom': 15,
            // Filtre : Uniquement si la hauteur existe et est >= 30
            'filter': ['>=', ['get', 'render_height'], 30],
            'layout': {
                'text-field': ['concat', ['get', 'render_height'], 'm'],
                'text-size': 12,
                'text-font': ['Open Sans Bold', 'Arial Unicode MS Bold'],
                // Place le texte au sommet du bâtiment
                'text-variable-anchor': ['top', 'bottom', 'left', 'right'],
                'text-padding': 2
            },
            'paint': {
                'text-color': '#555',
                'text-halo-color': '#fff',
                'text-halo-width': 1.5
            }
        });
    });

    // Rotation libre avec clic droit ou Ctrl + Clic
    map.dragRotate.enable();
    map.touchZoomRotate.enableRotation();
</script>
</body>
</html>
