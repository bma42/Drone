<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carte 3D Minimaliste</title>
    <link href="maplibre-gl.css" rel="stylesheet" />
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #f2f2f2; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
    </style>
</head>
<body>

<div id="map"></div>

<script src="maplibre-gl.js"></script>

<script>
    const map = new maplibregl.Map({
        container: 'map',
        // Style de base très clair
        style: 'https://tiles.openfreemap.org/styles/positron', 
        center: [2.349, 48.856],
        zoom: 16,
        pitch: 75, // Inclinaison forte par défaut
        bearing: 0,
        antialias: true,
        maxPitch: 85, // Autorise une vue presque à l'horizontale (profil)
        dragRotate: true
    });

    map.addControl(new maplibregl.NavigationControl(), 'top-right');

 map.on('load', () => {
    
    // --- ÉTAPE 0 : Forcer le comportement de la source ---
    // On redéfinit la source 'openmaptiles' pour autoriser le zoom infini (overscaling)
    // Cela évite que les bâtiments disparaissent au zoom 18+
    const source = map.getSource('openmaptiles');
    if (source) {
        source.maxzoom = 22; 
    }

    // --- ÉTAPE 1 : Épuration du style ---
    const layers = map.getStyle().layers;
    layers.forEach(layer => {
        if (layer.type !== 'background' && !layer.id.includes('building')) {
            map.setLayoutProperty(layer.id, 'visibility', 'none');
        }
    });

    // --- ÉTAPE 2 : Bâtiments (Ajout de l'option de rendu de loin) ---
    map.addLayer({
        'id': '3d-buildings',
        'source': 'openmaptiles',
        'source-layer': 'building',
        'type': 'fill-extrusion',
        'minzoom': 13,
        'paint': {
            'fill-extrusion-color': '#ffffff',
            'fill-extrusion-height': ['get', 'render_height'],
            'fill-extrusion-base': ['get', 'render_min_height'],
            'fill-extrusion-opacity': 0.9,
            // Optionnel : ajoute une légère bordure pour mieux voir les volumes en vue rasante
            'fill-extrusion-vertical-gradient': true 
        }
    });

    // --- ÉTAPE 3 : Étiquettes ---
    map.addLayer({
        'id': 'building-labels-30m',
        'source': 'openmaptiles',
        'source-layer': 'building',
        'type': 'symbol',
        'minzoom': 15,
        'filter': ['>=', ['get', 'render_height'], 30],
        'layout': {
            'text-field': ['concat', ['get', 'render_height'], 'm'],
            'text-size': 12,
            'text-font': ['Open Sans Bold', 'Arial Unicode MS Bold'],
            'text-allow-overlap': true, // Évite que l'étiquette disparaisse si une autre est proche
            'text-ignore-placement': true 
        },
        'paint': {
            'text-color': '#555',
            'text-halo-color': '#fff',
            'text-halo-width': 1.5
        }
    });
});

    // Rotation libre avec clic droit ou Ctrl + Clic
    map.dragRotate.enable();
    map.touchZoomRotate.enableRotation();
</script>
</body>
</html>
