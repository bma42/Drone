<!DOCTYPE html>
<html>
<head>
    <title>Radar Pluie Animé - RainViewer</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- CSS de Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 600px; width: 100%; }
        .controls { padding: 10px; background: #fff; position: absolute; top: 10px; left: 50px; z-index: 1000; border-radius: 5px; }
    </style>
</head>
<body>

<div class="controls">
    <button onclick="stopAnimation()">Stop</button>
    <button onclick="playAnimation()">Play</button>
    <span id="timestamp">Chargement...</span>
</div>
<div id="map"></div>

<!-- JS de Leaflet -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    var map = L.map('map').setView([46.6033, 1.8883], 6); // Centré sur la France
    var timestamps = [];
    var radarLayers = {};
    var currentIndex = 0;
    var animationTimer;

    // 1. Ajouter le fond de carte (OpenStreetMap)
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    // 2. Récupérer les données de RainViewer
    fetch('https://api.rainviewer.com/public/weather-maps.json')
        .then(res => res.json())
        .then(data => {
            timestamps = data.radar.past; // On récupère les relevés passés
            initializeRadarLayers();
            playAnimation();
        });

    function initializeRadarLayers() {
        timestamps.forEach(ts => {
            // Création d'une couche pour chaque timestamp (cachée par défaut)
            radarLayers[ts] = L.tileLayer(`https://tilecache.rainviewer.com/v2/radar/${ts}/256/{z}/{x}/{y}/2/1_1.png`, {
                opacity: 0,
                zIndex: 100
            }).addTo(map);
        });
    }

    function showFrame(index) {
        // Cacher l'ancienne couche
        var oldTs = timestamps[currentIndex];
        if (radarLayers[oldTs]) radarLayers[oldTs].setOpacity(0);

        // Afficher la nouvelle couche
        currentIndex = index;
        var newTs = timestamps[currentIndex];
        if (radarLayers[newTs]) radarLayers[newTs].setOpacity(0.7);

        // Mise à jour de l'affichage de l'heure
        var date = new Date(newTs * 1000);
        document.getElementById('timestamp').innerText = date.toLocaleTimeString();
    }

    function playAnimation() {
        stopAnimation();
        animationTimer = setInterval(() => {
            var nextIndex = (currentIndex + 1) % timestamps.length;
            showFrame(nextIndex);
        }, 500); // Vitesse de l'animation (500ms)
    }

    function stopAnimation() {
        clearInterval(animationTimer);
    }
</script>

</body>
</html>
