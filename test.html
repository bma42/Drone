<!DOCTYPE html>

<html>

<head>

<meta charset="utf-8"/>

<title>Photon Autocomplete</title>

<style>

body { font-family: sans-serif; padding: 20px; }

#results { border: 1px solid #ccc; max-width: 500px; margin-top: 5px; }

.item { padding: 8px; cursor: pointer; }

.item:hover { background: #eee; }

</style>

</head>

<body>

<input id="search" placeholder="Rechercher une rue..." />

<div id="results"></div>

<script>

const input = document.getElementById("search");

const results = document.getElementById("results");

let timer = null;

input.addEventListener("input", () => {

    clearTimeout(timer);

    const q = input.value;

    if (q.length < 3) {

        results.innerHTML = "";

        return;

    }

    timer = setTimeout(async () => {

        const url = `https://photon.komoot.io/api/?q=${encodeURIComponent(q)}&limit=8&lat=48.8566&lon=2.3522`;

        const res = await fetch(url);

        const data = await res.json();

        results.innerHTML = "";

        data.features.forEach(f => {

            const p = f.properties;

            const div = document.createElement("div");

            div.className = "item";

            div.textContent =

                (p.name || "") +

                (p.street ? " - " + p.street : "") +

                (p.city ? " - " + p.city : "");

            div.onclick = () => {

                input.value = p.name || "";

                results.innerHTML = "";

                console.log("Sélection :", f);

            };

            results.appendChild(div);

        });

    }, 250);

});

</script>

</body>

</html>
