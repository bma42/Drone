<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Buildings Only</title>
    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #d1d1d1; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        /* Masquer les logos pour le minimalisme */
        .maplibregl-ctrl-attrib, .maplibregl-ctrl-logo { display: none !important; }
    </style>
</head>
<body>

<div id="map"></div>

<script>
    const map = new maplibregl.Map({
        container: 'map',
        style: {
            version: 8,
            sources: {
                // Source vectorielle OpenFreeMap (données OSM)
                'openmaptiles': {
                    type: 'vector',
                    url: 'https://tiles.openfreemap.org/tiles/v3.json'
                }
            },
            layers: [{
                id: 'background',
                type: 'background',
                paint: { 'background-color': '#d1d1d1' }
            }]
        },
        center: [2.3488, 48.8534], // Paris
        zoom: 16,
        pitch: 60,
        antialias: true
    });

    map.on('load', () => {
        // Ajout unique de la couche des bâtiments
        map.addLayer({
            'id': '3d-buildings',
            'source': 'openmaptiles',
            'source-layer': 'building',
            'type': 'fill-extrusion',
            'minzoom': 14,
            'paint': {
                // Couleur blanche pour un look architectural pur
                'fill-extrusion-color': '#ffffff',
                // Extraction de la hauteur réelle
                'fill-extrusion-height': ['coalesce', ['get', 'render_height'], ['get', 'height'], 10],
                'fill-extrusion-base': ['coalesce', ['get', 'render_min_height'], ['get', 'min_height'], 0],
                'fill-extrusion-opacity': 1
            }
        });

        // Bouton de géolocalisation
        map.addControl(new maplibregl.GeolocateControl({
            positionOptions: { enableHighAccuracy: true },
            trackUserLocation: true,
            showUserLocation: true
        }));
    });
</script>

</body>
</html>
