<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carte 3D - Zoom Extrême</title>
    <link href="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #fdfdfd; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        .reset-button {
            position: absolute; top: 10px; left: 10px; z-index: 10;
            background: white; border: none; padding: 10px 15px;
            border-radius: 4px; cursor: pointer; font-weight: bold;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }
        .maplibregl-ctrl-attrib { display: none; }
    </style>
</head>
<body>

<button class="reset-button" onclick="resetView()">RESET VUE</button>
<div id="map"></div>

<script src="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.js"></script>

<script>
    const defaultSettings = {
        center: [2.349, 48.856],
        zoom: 18,
        pitch: 75,
        bearing: -10
    };

    const map = new maplibregl.Map({
        container: 'map',
        style: 'https://tiles.openfreemap.org/styles/positron', 
        center: defaultSettings.center,
        zoom: defaultSettings.zoom,
        pitch: defaultSettings.pitch,
        bearing: defaultSettings.bearing,
        antialias: true,
        maxPitch: 85,
        // --- CRITIQUE POUR LE ZOOM ---
        maxZoom: 24,           // Autorise le zoom très profond
        transformRequest: (url) => { return { url }; } 
    });

    function resetView() {
        map.flyTo({ ...defaultSettings, duration: 2000, essential: true });
    }

    map.addControl(new maplibregl.NavigationControl({ visualizePitch: true }), 'top-right');
    map.addControl(new maplibregl.GeolocateControl({
        positionOptions: { enableHighAccuracy: true },
        trackUserLocation: true, showUserHeading: true
    }), 'top-right');

    // Cette fonction force la source à ne pas disparaître
    function fixSource() {
        const source = map.getSource('openmaptiles');
        if (source && source.maxzoom !== 24) {
            source.maxzoom = 24; // Force l'overscaling jusqu'au zoom 24
        }
    }

    map.on('load', () => {
        fixSource();

        // Nettoyage minimaliste
        map.getStyle().layers.forEach(layer => {
            if (layer.type !== 'background' && !layer.id.includes('building')) {
                map.setLayoutProperty(layer.id, 'visibility', 'none');
            }
        });

        // Bâtiments 3D
        map.addLayer({
            'id': '3d-buildings-main',
            'source': 'openmaptiles',
            'source-layer': 'building',
            'type': 'fill-extrusion',
            'minzoom': 13,
            'paint': {
                'fill-extrusion-color': '#ffffff',
                'fill-extrusion-height': ['coalesce', ['get', 'render_height'], ['get', 'height'], 10],
                'fill-extrusion-base': ['coalesce', ['get', 'render_min_height'], ['get', 'min_height'], 0],
                'fill-extrusion-opacity': 0.9,
                'fill-extrusion-vertical-gradient': true
            }
        });

        // Étiquettes
        map.addLayer({
            'id': 'labels-height-30m',
            'source': 'openmaptiles',
            'source-layer': 'building',
            'type': 'symbol',
            'minzoom': 14,
            'filter': ['>=', ['coalesce', ['get', 'render_height'], ['get', 'height'], 0], 30],
            'layout': {
                'text-field': ['concat', ['coalesce', ['get', 'render_height'], ['get', 'height']], 'm'],
                'text-size': 12,
                'text-font': ['Open Sans Bold', 'Arial Unicode MS Bold'],
                'text-allow-overlap': true,
                'text-ignore-placement': true,
                'text-anchor': 'bottom',
                'text-offset': [0, -1]
            },
            'paint': {
                'text-color': '#000',
                'text-halo-color': '#fff',
                'text-halo-width': 2
            }
        });
    });

    // Sécurité : Ré-appliquer le fix si le style ou les données changent
    map.on('sourcedata', fixSource);
    map.on('styledata', fixSource);

</script>
</body>
</html>
