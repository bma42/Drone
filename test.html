<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deck.gl + MapLibre : Bâtiments Gris & Ombres</title>
    <script src="https://unpkg.com/deck.gl@latest/dist.min.js"></script>
    <script src="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #111; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
    </style>
</head>
<body>
<div id="map"></div>
<script>

    const ambientLight = new deck.AmbientLight({
        color: [255, 255, 255],
        intensity: 1.0
    });

    const directionalLight = new deck.DirectionalLight({
        color: [255, 255, 255],
        intensity: 2.0,
        direction: [-1, -2, -3],
        _shadow: true
    });

    const lightingEffect = new deck.LightingEffect({ambientLight, directionalLight});

    const map = new maplibregl.Map({
        container: 'map',
        style: 'https://tiles.openfreemap.org/styles/positron',
        center: [2.349, 48.856],
        zoom: 16,
        pitch: 60,
        bearing: 0,
        interactive: true,
        antialias: true
    });

    const deckInstance = new deck.DeckGL({
        mapStyle: 'https://tiles.openfreemap.org/styles/positron',
        initialViewState: {
            longitude: 2.349,
            latitude: 48.856,
            zoom: 16,
            pitch: 60,
            bearing: 0
        },
        controller: true,
        onViewStateChange: ({viewState}) => {
            map.jumpTo({
                center: [viewState.longitude, viewState.latitude],
                zoom: viewState.zoom,
                bearing: viewState.bearing,
                pitch: viewState.pitch
            });
        },
        effects: [lightingEffect],
        layers: [
            new deck.GeoJsonLayer({
                id: 'buildings-3d',
                data: 'https://raw.githubusercontent.com/visgl/deck.gl-data/master/examples/geojson/vancouver-blocks.json', // Exemple GeoJSON pour structure
                // Pour utiliser tes tuiles OpenMapTiles directement, on utilise un VectorTileLayer
                // Mais pour les ombres réelles Deck.gl, le GeoJsonLayer est le plus précis
                extruded: true,
                getElevation: f => f.properties.value || 30,
                getFillColor: [180, 180, 180],
                material: {
                    ambient: 0.1,
                    diffuse: 0.6,
                    shininess: 32,
                    specularColor: [60, 60, 60]
                },
                transitions: {
                    getElevation: 600
                }
            })
        ]
    });

    map.on('load', () => {
        map.getStyle().layers.forEach(layer => {
            if (layer.id.includes('building')) {
                map.setLayoutProperty(layer.id, 'visibility', 'none');
            }
        });
    });

</script>
</body>
</html>
