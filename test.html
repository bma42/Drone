<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carte 3D Minimaliste + Géo</title>
    
    <link href="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #fdfdfd; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        
        /* Personnalisation légère des boutons pour le minimalisme */
        .maplibregl-ctrl-group {
            border: none !important;
            box-shadow: 0 0 15px rgba(0,0,0,0.1) !important;
        }
        .maplibregl-ctrl-attrib { display: none; }
    </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.js"></script>

<script>
    const map = new maplibregl.Map({
        container: 'map',
        style: 'https://tiles.openfreemap.org/styles/positron', 
        center: [2.349, 48.856],
        zoom: 16,
        pitch: 70, 
        bearing: 0,
        antialias: true,
        maxPitch: 85,
        dragRotate: true
    });

    // --- CONFIGURATION GÉOLOCALISATION ---
    const geolocate = new maplibregl.GeolocateControl({
        positionOptions: {
            enableHighAccuracy: true // GPS précis
        },
        trackUserLocation: true,    // Suit le mouvement en temps réel
        showUserHeading: true,      // Affiche la direction (boussole)
        showAccuracyCircle: true    // Affiche le cercle de précision bleue
    });

    // Ajout du contrôle de navigation classique
    map.addControl(new maplibregl.NavigationControl({ visualizePitch: true }), 'top-right');
    
    // Ajout du bouton de géolocalisation en dessous
    map.addControl(geolocate, 'top-right');

    map.on('load', () => {
        
        // Fix pour éviter la disparition des bâtiments au zoom
        if (map.getSource('openmaptiles')) {
            map.getSource('openmaptiles').maxzoom = 22;
        }

        // Épuration minimaliste
        const layers = map.getStyle().layers;
        layers.forEach(layer => {
            const isBuilding = layer.id.includes('building');
            const isBackground = layer.type === 'background';
            if (!isBuilding && !isBackground) {
                map.setLayoutProperty(layer.id, 'visibility', 'none');
            }
        });

        // Bâtiments 3D
        map.addLayer({
            'id': '3d-buildings-main',
            'source': 'openmaptiles',
            'source-layer': 'building',
            'type': 'fill-extrusion',
            'minzoom': 13,
            'paint': {
                'fill-extrusion-color': '#ffffff',
                'fill-extrusion-height': ['get', 'render_height'],
                'fill-extrusion-base': ['get', 'render_min_height'],
                'fill-extrusion-opacity': 0.85,
                'fill-extrusion-vertical-gradient': true
            }
        });

        // Étiquettes hauteur > 30m
        map.addLayer({
            'id': 'labels-height-30m',
            'source': 'openmaptiles',
            'source-layer': 'building',
            'type': 'symbol',
            'minzoom': 15.5,
            'filter': ['>=', ['get', 'render_height'], 30],
            'layout': {
                'text-field': ['concat', ['get', 'render_height'], 'm'],
                'text-size': 11,
                'text-font': ['Open Sans Bold', 'Arial Unicode MS Bold'],
                'text-allow-overlap': true,
                'text-ignore-placement': true,
                'text-anchor': 'center'
            },
            'paint': {
                'text-color': '#444',
                'text-halo-color': 'rgba(255,255,255,0.8)',
                'text-halo-width': 1.5
            }
        });
    });

    // Déclenchement automatique de la géolocalisation au chargement (optionnel)
    // geolocate.on('geolocate', () => { console.log('Position trouvée'); });

</script>
</body>
</html>
