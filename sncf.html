<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNCF Radar - Restauration</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #0a0a0a; color: white; font-family: sans-serif; overflow: hidden; }
        #map { height: 100%; width: 100%; }
        .ui { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); z-index: 1000; 
              background: rgba(20, 20, 20, 0.95); padding: 12px; border-radius: 12px; text-align: center; width: 260px; 
              border: 1px solid #444; backdrop-filter: blur(8px); }
        button { background: #007aff; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
        #log { font-size: 11px; color: #00ffcc; margin-top: 8px; font-family: monospace; text-align: left; }
        .error { color: #ff4d4d !important; }
    </style>
</head>
<body>

<div class="ui">
    <button id="btn">SCANNER LA ZONE</button>
    <div id="log">Système prêt (v1.0)</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', { zoomControl: false }).setView([48.85, 2.34], 12);
    const railLayer = L.layerGroup().addTo(map);
    const trainLayer = L.layerGroup().addTo(map);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    async function scan() {
        const c = map.getCenter();
        log.innerHTML = "📡 Synchronisation...";

        const latLon = `${c.lat},${c.lng}`;

        // 1. CHARGEMENT DES LIGNES (Dataset stable)
        const railUrl = `https://ressources.data.sncf.com/api/records/1.0/search/?dataset=formes-des-lignes-du-rfn&rows=100&geofilter.distance=${latLon},15000`;
        
        try {
            const resRail = await fetch(railUrl);
            const dataRail = await resRail.json();
            railLayer.clearLayers();
            if (dataRail.records) {
                dataRail.records.forEach(r => {
                    if (r.fields.geo_shape) {
                        L.geoJSON(r.fields.geo_shape, { style: { color: "#1e40af", weight: 2, opacity: 0.6 } }).addTo(railLayer);
                    }
                });
                log.innerHTML = "✅ Lignes : OK";
            }
        } catch (e) { log.innerHTML = "<span class='error'>Lignes : Erreur v1</span>"; }

        // 2. CHARGEMENT DES TRAINS
        // On teste le dataset standard, s'il échoue on ne bloque pas les lignes
        const trainUrl = `https://ressources.data.sncf.com/api/records/1.0/search/?dataset=positions-temps-reel-des-trains&rows=100&geofilter.distance=${latLon},50000`;

        try {
            const resTrain = await fetch(trainUrl);
            if (!resTrain.ok) throw new Error("Dataset Trains introuvable");
            
            const dataTrain = await resTrain.json();
            trainLayer.clearLayers();

            if (dataTrain.records && dataTrain.records.length > 0) {
                dataTrain.records.forEach(r => {
                    const pos = r.fields.geopoint;
                    if (pos) {
                        L.circleMarker([pos[0], pos[1]], {
                            radius: 8, fillColor: "#ffec00", color: "#000", weight: 1, fillOpacity: 1
                        }).addTo(trainLayer).bindPopup(`Train ${r.fields.train_number}`);
                    }
                });
                log.innerHTML += `<br>✅ Trains : ${dataTrain.records.length} trouvés`;
            } else {
                log.innerHTML += "<br>ℹ️ Aucun train (50km)";
            }
        } catch (e) {
            log.innerHTML += `<br><span class="error">Trains : Indisponible</span>`;
        }
    }

    document.getElementById('btn').onclick = () => {
        navigator.geolocation.getCurrentPosition(p => {
            map.setView([p.coords.latitude, p.coords.longitude], 12);
            scan();
        }, () => scan());
    };

    map.on('moveend', scan);
    setInterval(scan, 45000); // Rafraîchissement toutes les 45s
    scan();
</script>
</body>
</html>
