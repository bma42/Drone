<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNCF Radar Fix</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #map { height: 100%; width: 100%; }
        .ui { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); z-index: 1000; 
              background: rgba(20, 20, 20, 0.95); padding: 12px; border-radius: 12px; text-align: center; width: 260px; 
              border: 1px solid #444; backdrop-filter: blur(5px); }
        button { background: #007aff; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
        #log { font-size: 11px; color: #0fcc; margin-top: 8px; font-family: monospace; text-align: left; }
        .error { color: #ff4d4d; }
    </style>
</head>
<body>

<div class="ui">
    <button id="btn">LANCER LE SCAN</button>
    <div id="log">En attente...</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', { zoomControl: false }).setView([48.85, 2.34], 12);
    const railLayer = L.layerGroup().addTo(map);
    const trainLayer = L.layerGroup().addTo(map);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    async function updateRadar() {
        const c = map.getCenter();
        log.innerHTML = "Recherche en cours...";

        const params = new URLSearchParams({
            where: `within_distance(geopoint, geom'POINT(${c.lng} ${c.lat})', 30000m)`,
            limit: 50
        });

        const url = `https://ressources.data.sncf.com/api/explore/v2.1/catalog/datasets/positions-temps-reel-des-trains/records?${params.toString()}`;

        try {
            const response = await fetch(url, {
                method: 'GET',
                mode: 'cors',
                headers: { 'Accept': 'application/json' }
            });

            if (!response.ok) throw new Error("Statut " + response.status);

            const data = await response.json();
            trainLayer.clearLayers();

            if (!data.results || data.results.length === 0) {
                log.innerText = "Aucun train (30km)";
            } else {
                data.results.forEach(t => {
                    if (t.geopoint) {
                        L.circleMarker([t.geopoint.lat, t.geopoint.lon], {
                            radius: 8, fillColor: "#ff0", color: "#000", weight: 1, fillOpacity: 1
                        }).addTo(trainLayer).bindPopup(`Train ${t.train_number}`);
                    }
                });
                log.innerText = data.results.length + " trains détectés";
            }
            
            loadRails(c.lat, c.lng);

        } catch (e) {
            log.innerHTML = `<span class="error">ÉCHEC : ${e.message}</span><br><a href="${url}" target="_blank" style="color:#007aff">Tester le lien API</a>`;
        }
    }

    async function loadRails(lat, lon) {
        const url = `https://ressources.data.sncf.com/api/explore/v2.1/catalog/datasets/formes-des-lignes-du-rfn/records?where=within_distance(geo_shape, geom'POINT(${lon} ${lat})', 15000m)&limit=100`;
        try {
            const res = await fetch(url);
            const data = await res.json();
            railLayer.clearLayers();
            data.results.forEach(r => {
                L.geoJSON(r.geo_shape, { style: { color: "#1e3a8a", weight: 2, opacity: 0.5 } }).addTo(railLayer);
            });
        } catch (e) { console.warn("Rails failed"); }
    }

    document.getElementById('btn').onclick = () => {
        navigator.geolocation.getCurrentPosition(p => {
            map.setView([p.coords.latitude, p.coords.longitude], 12);
            updateRadar();
        }, () => updateRadar());
    };

    map.on('moveend', updateRadar);
    updateRadar();
</script>
</body>
</html>
