<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNCF Radar Fix</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #0f0f0f; color: white; font-family: sans-serif; overflow: hidden; }
        #map { height: 100%; width: 100%; }
        .ui { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); z-index: 1000; 
              background: rgba(20, 20, 20, 0.9); padding: 15px; border-radius: 12px; text-align: center; width: 280px; 
              border: 1px solid #444; backdrop-filter: blur(5px); }
        button { background: #007aff; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
        #log { font-size: 11px; color: #aaa; margin-top: 10px; }
        .error { color: #ff4d4d !important; }
    </style>
</head>
<body>

<div class="ui">
    <button id="btn">LANCER LE RADAR</button>
    <div id="log">En attente...</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', { zoomControl: false }).setView([46.6, 2.2], 5);
    const log = document.getElementById('log');
    const btn = document.getElementById('btn');
    const trainLayer = L.layerGroup().addTo(map);
    const railLayer = L.layerGroup().addTo(map);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    btn.onclick = () => {
        log.innerText = "Recherche GPS...";
        navigator.geolocation.getCurrentPosition(pos => {
            const { latitude, longitude } = pos.coords;
            map.setView([latitude, longitude], 12);
            L.circleMarker([latitude, longitude], { color: '#00ffcc', radius: 6 }).addTo(map);
            
            // Premier chargement
            loadInfrastructure(latitude, longitude);
            updateTrains(latitude, longitude);
            
            // Boucle de rafraîchissement
            setInterval(() => updateTrains(latitude, longitude), 30000); 
            btn.style.display = 'none';
        }, () => {
            log.innerHTML = `<span class="error">GPS indisponible.</span>`;
        });
    };

    async function loadInfrastructure(lat, lon) {
        const url = `https://ressources.data.sncf.com/api/records/1.0/search/?dataset=formes-des-lignes-du-rfn&rows=200&geofilter.distance=${lat},${lon},15000`;
        try {
            const res = await fetch(url);
            const data = await res.json();
            data.records.forEach(r => {
                L.geoJSON(r.fields.geo_shape, { style: { color: "#1e3a8a", weight: 2, opacity: 0.5 } }).addTo(railLayer);
            });
        } catch (e) { console.error("Erreur rails:", e); }
    }

    async function updateTrains(lat, lon) {
        log.innerText = "Actualisation des trains...";
        // Utilisation du format v1.0 pour éviter les erreurs de parsing
        const url = `https://ressources.data.sncf.com/api/records/1.0/search/?dataset=positions-temps-reel-des-trains&rows=100&geofilter.distance=${lat},${lon},30000`;

        try {
            const res = await fetch(url);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            
            const data = await res.json();
            trainLayer.clearLayers();

            if (!data.records || data.records.length === 0) {
                log.innerText = "Aucun train détecté (30km).";
                return;
            }

            data.records.forEach(record => {
                const pos = record.fields.geopoint;
                const info = record.fields;

                const marker = L.circleMarker([pos[0], pos[1]], {
                    radius: 8,
                    fillColor: "#ffec00",
                    color: "#000",
                    weight: 1,
                    fillOpacity: 1
                });

                marker.bindPopup(`
                    <b>Train n°${info.train_number}</b><br>
                    Retard: ${info.delay || '0'} min<br>
                    Vitesse: ${info.speed || 'N/C'} km/h
                `).addTo(trainLayer);
            });

            log.innerText = `${data.records.length} trains suivis (${new Date().toLocaleTimeString()})`;
        } catch (e) {
            console.error("Détail erreur:", e);
            log.innerHTML = `<span class="error">Erreur API : ${e.message}</span>`;
        }
    }
</script>
</body>
</html>
