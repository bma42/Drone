<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réseau Ferré National - Live View</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; background: #121212; }
        #map { height: 100%; width: 100%; }
        .ui-panel {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: rgba(30, 30, 30, 0.9); color: white;
            padding: 15px; border-radius: 8px; border: 1px solid #444;
            text-align: center; min-width: 250px;
        }
        #status { font-size: 0.9em; color: #aaa; margin-top: 5px; }
        .error { color: #ff6b6b !important; }
    </style>
</head>
<body>

<div class="ui-panel">
    <strong>Réseau Ferré National</strong>
    <div id="status">Initialisation de la carte...</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // Configuration de la carte (centrée sur la France)
    const map = L.map('map').setView([46.6033, 1.8883], 6);

    // Fond de carte sombre (CartoDB Dark)
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    async function fetchRailLines() {
        const statusEl = document.getElementById('status');
        
        // URL avec limite à 1000 lignes pour garantir un affichage rapide
        // Supprimez "&limit=1000" pour charger l'intégralité du réseau (Attention : ~25Mo)
        const url = "https://ressources.data.sncf.com/api/explore/v2.1/catalog/datasets/lignes-par-ligne-du-reseau-ferre-national/exports/geojson?limit=1000";

        try {
            statusEl.innerText = "Téléchargement des données SNCF...";
            
            const response = await fetch(url);
            
            if (!response.ok) {
                throw new Error(`Serveur SNCF injoignable (Code: ${response.status})`);
            }

            const data = await response.json();
            statusEl.innerText = "Traitement géographique...";

            L.geoJSON(data, {
                style: {
                    color: "#00a8ff",
                    weight: 2,
                    opacity: 0.6
                },
                onEachFeature: (feature, layer) => {
                    if (feature.properties && feature.properties.libelle) {
                        layer.bindPopup(`<strong>Ligne :</strong><br>${feature.properties.libelle}`);
                    }
                }
            }).addTo(map);

            statusEl.innerText = "Réseau chargé avec succès.";
            setTimeout(() => { statusEl.parentElement.style.display = 'none'; }, 3000);

        } catch (error) {
            console.error(error);
            statusEl.innerText = "Erreur : " + error.message;
            statusEl.classList.add('error');
        }
    }

    // Exécution
    fetchRailLines();
</script>
</body>
</html>
