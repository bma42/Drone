<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SNCF Radar Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #0f0f0f; color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; overflow: hidden; }
        #map { height: 100%; width: 100%; }
        .ui { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); z-index: 1000; 
              background: rgba(20, 20, 20, 0.9); padding: 15px; border-radius: 15px; text-align: center; width: 280px; 
              border: 1px solid #333; backdrop-filter: blur(10px); box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        button { background: #007aff; color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: 600; font-size: 14px; transition: background 0.2s; }
        button:active { background: #0051a8; }
        #log { font-size: 11px; color: #888; margin-top: 10px; line-height: 1.4; }
        .error { color: #ff3b30 !important; }
        .train-label { background: none; border: none; color: #ffec00; font-weight: bold; text-shadow: 0 0 3px #000; }
    </style>
</head>
<body>

<div class="ui">
    <button id="btn">ARMER LE RADAR</button>
    <div id="log">Prêt pour le scan.</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([46.6, 2.2], 5);
    const log = document.getElementById('log');
    const btn = document.getElementById('btn');
    const trainLayer = L.layerGroup().addTo(map);
    const railLayer = L.layerGroup().addTo(map);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    btn.onclick = () => {
        log.innerText = "Localisation GPS...";
        navigator.geolocation.getCurrentPosition(pos => {
            const { latitude, longitude } = pos.coords;
            map.setView([latitude, longitude], 12);
            
            L.circleMarker([latitude, longitude], { color: '#00ffcc', radius: 5, fillOpacity: 1 }).addTo(map);
            
            loadData(latitude, longitude);
            setInterval(() => updateTrains(latitude, longitude), 60000);
            
            btn.style.display = 'none';
        }, err => {
            log.innerHTML = `<span class="error">Erreur GPS. Vérifiez les permissions HTTPS.</span>`;
        }, { enableHighAccuracy: true });
    };

    async function loadData(lat, lon) {
        log.innerText = "Chargement des infrastructures...";
        const dataset = "formes-des-lignes-du-rfn";
        const url = `https://ressources.data.sncf.com/api/records/1.0/search/?dataset=${dataset}&rows=400&geofilter.distance=${lat},${lon},15000`;

        try {
            const res = await fetch(url);
            const data = await res.json();
            
            data.records.forEach(record => {
                const geo = record.fields.geo_shape || record.geometry;
                if (geo) {
                    L.geoJSON(geo, { style: { color: "#1e3a8a", weight: 3, opacity: 0.6 } }).addTo(railLayer);
                }
            });
            updateTrains(lat, lon);
        } catch (e) {
            log.innerText = "Erreur infrastructure.";
        }
    }

    async function updateTrains(lat, lon) {
        log.innerText = "Scan des convois en cours...";
        const url = `https://ressources.data.sncf.com/api/explore/v2.1/catalog/datasets/positions-temps-reel-des-trains/records?where=within_distance(geopoint, geom'POINT(${lon} ${lat})', 25000m)&limit=100`;

        try {
            const res = await fetch(url);
            const data = await res.json();
            
            trainLayer.clearLayers();
            
            data.results.forEach(train => {
                if (!train.geopoint) return;

                const marker = L.circleMarker([train.geopoint.lat, train.geopoint.lon], {
                    radius: 7,
                    fillColor: "#ffec00",
                    color: "#fff",
                    weight: 1,
                    fillOpacity: 1
                });

                const info = `
                    <div style="color:#000; font-size:12px;">
                        <b>Train ${train.train_number}</b><br>
                        ${train.route_long_name || 'Ligne inconnue'}<br>
                        Vitesse: ${train.speed || 0} km/h
                    </div>
                `;

                marker.bindPopup(info).addTo(trainLayer);
            });

            log.innerText = `${data.results.length} trains détectés (Maj: ${new Date().toLocaleTimeString()})`;
        } catch (e) {
            log.innerText = "Erreur mise à jour trains.";
        }
    }
</script>
</body>
</html>
