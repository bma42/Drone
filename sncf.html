<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SNCF Infrastructure</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #050505; overflow: hidden; }
        #map { height: 100%; width: 100%; background: #050505; }
        .ui { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); z-index: 1000; 
              background: rgba(15, 15, 15, 0.9); padding: 10px 20px; border-radius: 20px; 
              border: 1px solid #333; backdrop-filter: blur(10px); color: #00ffcc; 
              font-family: monospace; font-size: 12px; pointer-events: none; }
    </style>
</head>
<body>

<div class="ui" id="status">INITIALISATION INFRA...</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', { 
        zoomControl: false, 
        attributionControl: false,
        preferCanvas: true 
    }).setView([48.85, 2.34], 12);

    const routesLayer = L.featureGroup().addTo(map);
    const stationsLayer = L.featureGroup().addTo(map);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    async function loadInfra() {
        const c = map.getCenter();
        const status = document.getElementById('status');
        status.innerText = "CHARGEMENT...";

        const bbox = map.getBounds().toBBoxString().split(',').join(',');
        
        try {
            const [resVoies, resGares] = await Promise.all([
                fetch(`https://ressources.data.sncf.com/api/records/1.0/search/?dataset=formes-des-lignes-du-rfn&rows=200&geofilter.distance=${c.lat},${c.lng},20000`),
                fetch(`https://ressources.data.sncf.com/api/records/1.0/search/?dataset=referentiel-gares-voyageurs&rows=100&geofilter.distance=${c.lat},${c.lng},20000`)
            ]);

            const dataVoies = await resVoies.json();
            const dataGares = await resGares.json();

            routesLayer.clearLayers();
            stationsLayer.clearLayers();

            if (dataVoies.records) {
                dataVoies.records.forEach(r => {
                    L.geoJSON(r.fields.geo_shape, {
                        style: { color: "#1e40af", weight: 2, opacity: 0.5, interactive: false }
                    }).addTo(routesLayer);
                });
            }

            if (dataGares.records) {
                dataGares.records.forEach(g => {
                    const pos = g.fields.wgs_84;
                    if (pos) {
                        L.circleMarker([pos[0], pos[1]], {
                            radius: 4,
                            fillColor: "#007aff",
                            color: "#fff",
                            weight: 1,
                            fillOpacity: 0.8
                        }).addTo(stationsLayer).bindPopup(`<b>${g.fields.gare_alias_libelle_non_sncf || g.fields.gare_ut_libelle}</b>`);
                    }
                });
            }

            status.innerText = `${dataGares.records.length} GARES DÉTECTÉES`;

        } catch (e) {
            status.innerText = "ERREUR DE FLUX";
        }
    }

    map.on('moveend', loadInfra);
    
    navigator.geolocation.getCurrentPosition(p => {
        map.setView([p.coords.latitude, p.coords.longitude], 13);
        loadInfra();
    }, () => loadInfra());

</script>
</body>
</html>
