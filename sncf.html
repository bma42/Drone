<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SNCF Radar Final</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #map { height: 100%; width: 100%; }
        .ui { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); z-index: 1000; 
              background: #111; padding: 12px; border-radius: 10px; width: 250px; border: 1px solid #333; text-align: center; }
        button { background: #007aff; color: #fff; border: none; padding: 10px; border-radius: 6px; width: 100%; font-weight: bold; }
        #log { font-size: 10px; color: #0f0; margin-top: 8px; font-family: monospace; }
    </style>
</head>
<body>

<div class="ui">
    <button id="btn">SCANNER</button>
    <div id="log">SYSTÈME PRÊT</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', { zoomControl: false }).setView([48.85, 2.34], 12);
    const trains = L.layerGroup().addTo(map);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    async function scan() {
        const c = map.getCenter();
        log.innerText = "APPEL DIRECT...";

        const url = `https://ressources.data.sncf.com/api/explore/v2.1/catalog/datasets/positions-temps-reel-des-trains/records?where=within_distance(geopoint%2C%20geom'POINT(${c.lng}%20${c.lat})'%2C%2050km)&limit=50`;

        try {
            const response = await fetch(url, {
                method: 'GET',
                mode: 'cors',
                referrerPolicy: 'no-referrer' 
            });

            if (!response.ok) {
                if (response.status === 429) throw new Error("TROP DE REQUÊTES (ATTENDEZ)");
                throw new Error("ERREUR " + response.status);
            }

            const data = await response.json();
            trains.clearLayers();

            if (!data.results || data.results.length === 0) {
                log.innerText = "ZONE VIDE";
                return;
            }

            data.results.forEach(t => {
                if (t.geopoint) {
                    L.circleMarker([t.geopoint.lat, t.geopoint.lon], {
                        radius: 8, fillColor: "#ff0", color: "#000", weight: 1, fillOpacity: 1
                    }).addTo(trains).bindPopup("Train " + t.train_number);
                }
            });

            log.innerText = data.results.length + " TRAINS DÉTECTÉS";
        } catch (e) {
            log.innerHTML = `<span style="color:red">${e.message}</span>`;
            console.error(e);
        }
    }

    document.getElementById('btn').onclick = scan;
    map.on('moveend', scan);
    scan();
</script>
</body>
</html>
