<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNCF Radar - Fix 404</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #0a0a0a; color: white; font-family: sans-serif; }
        #map { height: 100%; width: 100%; }
        .ui { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); z-index: 1000; 
              background: rgba(25, 25, 25, 0.95); padding: 15px; border-radius: 12px; text-align: center; width: 260px; 
              border: 1px solid #444; backdrop-filter: blur(8px); }
        button { background: #007aff; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
        #log { font-size: 11px; color: #00ffcc; margin-top: 8px; font-family: monospace; }
        .error { color: #ff4d4d !important; }
    </style>
</head>
<body>

<div class="ui">
    <button id="btn">SCANNER MA POSITION</button>
    <div id="log">Prêt</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', { zoomControl: false }).setView([46.6, 2.2], 6);
    const log = document.getElementById('log');
    const trainLayer = L.layerGroup().addTo(map);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    async function updateTrains() {
        const center = map.getCenter();
        log.innerText = "Recherche de convois...";

        // Construction propre de l'URL pour éviter la 404
        const baseUrl = "https://ressources.data.sncf.com/api/explore/v2.1/catalog/datasets/positions-temps-reel-des-trains/records";
        
        // Ordre impératif v2.1 : POINT(Longitude Latitude)
        const whereClause = `within_distance(geopoint, geom'POINT(${center.lng} ${center.lat})', 50000m)`;
        
        const params = new URLSearchParams({
            where: whereClause,
            limit: 50
        });

        try {
            const response = await fetch(`${baseUrl}?${params.toString()}`);
            
            if (!response.ok) {
                throw new Error(`Code ${response.status}`);
            }

            const data = await response.json();
            trainLayer.clearLayers();

            if (!data.results || data.results.length === 0) {
                log.innerText = "Aucun train (rayon 50km)";
                return;
            }

            data.results.forEach(train => {
                if (train.geopoint) {
                    L.circleMarker([train.geopoint.lat, train.geopoint.lon], {
                        radius: 8, fillColor: "#ffec00", color: "#000", weight: 1, fillOpacity: 1
                    }).addTo(trainLayer)
                      .bindPopup(`<b>Train ${train.train_number}</b><br>Vitesse : ${train.speed || 0} km/h`);
                }
            });

            log.innerText = `${data.results.length} trains détectés`;

        } catch (e) {
            log.innerHTML = `<span class="error">Erreur API : ${e.message}</span>`;
            console.error("Détails:", e);
        }
    }

    // Bouton GPS
    document.getElementById('btn').onclick = () => {
        navigator.geolocation.getCurrentPosition(pos => {
            map.setView([pos.coords.latitude, pos.coords.longitude], 11);
            updateTrains();
        });
    };

    // Scan automatique
    map.on('moveend', updateTrains);
    setInterval(updateTrains, 30000);

    // Premier scan
    updateTrains();
</script>
</body>
</html>
