<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carte des Lignes SNCF</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #1a1a1a; }
        #map { height: 100%; width: 100%; }
        .loading-overlay {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: rgba(0,0,0,0.8); color: white;
            padding: 8px 15px; border-radius: 20px; font-family: sans-serif;
            pointer-events: none; display: block;
        }
    </style>
</head>
<body>

<div id="loading" class="loading-overlay">Chargement des lignes ferroviaires...</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map').setView([46.6033, 1.8883], 6);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    async function loadRailLines() {
        const url = "https://ressources.data.sncf.com/api/explore/v2.1/catalog/datasets/lignes-par-ligne-du-reseau-ferre-national/exports/geojson";
        
        try {
            const response = await fetch(url);
            const data = await response.json();
            
            L.geoJSON(data, {
                style: function(feature) {
                    return {
                        color: "#008cff",
                        weight: 2,
                        opacity: 0.7
                    };
                },
                onEachFeature: function (feature, layer) {
                    if (feature.properties && feature.properties.libelle) {
                        layer.bindPopup("<b>Ligne:</b> " + feature.properties.libelle);
                    }
                }
            }).addTo(map);

            document.getElementById('loading').style.display = 'none';
        } catch (error) {
            console.error("Erreur de chargement:", error);
            document.getElementById('loading').innerText = "Erreur de chargement des données.";
        }
    }

    loadRailLines();
</script>
</body>
</html>
