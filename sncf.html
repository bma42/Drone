<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNCF Radar Dynamique</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #0a0a0a; color: white; font-family: sans-serif; overflow: hidden; }
        #map { height: 100%; width: 100%; }
        .ui { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); z-index: 1000; 
              background: rgba(25, 25, 25, 0.9); padding: 12px; border-radius: 12px; text-align: center; width: 260px; 
              border: 1px solid #333; backdrop-filter: blur(8px); box-shadow: 0 4px 15px rgba(0,0,0,0.6); }
        button { background: #007aff; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; transition: 0.2s; }
        button:hover { background: #005bbd; }
        #log { font-size: 11px; color: #00ffcc; margin-top: 8px; font-family: monospace; }
        .error { color: #ff4d4d !important; }
    </style>
</head>
<body>

<div class="ui">
    <button id="btn">CENTRER SUR MOI</button>
    <div id="log">Déplacez la carte pour scanner</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // Initialisation de la carte (France par défaut)
    const map = L.map('map', { zoomControl: false }).setView([46.6, 2.2], 6);
    const log = document.getElementById('log');
    const btn = document.getElementById('btn');
    
    const trainLayer = L.layerGroup().addTo(map);
    const railLayer = L.layerGroup().addTo(map);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    // --- LOGIQUE DE SCAN ---

    function scanZone() {
        const center = map.getCenter();
        const zoom = map.getZoom();
        
        // On n'affiche les rails que si on est assez proche pour la performance
        if (zoom >= 10) {
            loadInfrastructure(center.lat, center.lng);
        } else {
            railLayer.clearLayers();
            log.innerText = "Zoomez pour voir les rails";
        }
        
        updateTrains(center.lat, center.lng);
    }

    // Déclencher le scan quand on finit de bouger la carte
    map.on('moveend', scanZone);

    // Bouton GPS
    btn.onclick = () => {
        log.innerText = "Localisation...";
        navigator.geolocation.getCurrentPosition(pos => {
            map.setView([pos.coords.latitude, pos.coords.longitude], 13);
            // Le scan s'exécutera via l'événement moveend déclenché par setView
        }, () => {
            log.innerHTML = `<span class="error">GPS bloqué.</span>`;
        });
    };

    // --- APPELS API ---

    async function loadInfrastructure(lat, lon) {
        // Rayon dynamique selon le zoom
        const url = `https://ressources.data.sncf.com/api/records/1.0/search/?dataset=formes-des-lignes-du-rfn&rows=150&geofilter.distance=${lat},${lon},15000`;
        try {
            const res = await fetch(url);
            const data = await res.json();
            railLayer.clearLayers();
            data.records.forEach(r => {
                L.geoJSON(r.fields.geo_shape, { style: { color: "#1e3a8a", weight: 2, opacity: 0.6 } }).addTo(railLayer);
            });
        } catch (e) { console.error("Erreur rails"); }
    }

    async function updateTrains(lat, lon) {
        log.innerText = "Scan des trains...";
        const url = `https://ressources.data.sncf.com/api/records/1.0/search/?dataset=positions-temps-reel-des-trains&rows=100&geofilter.distance=${lat},${lon},30000`;

        try {
            const res = await fetch(url);
            const data = await res.json();
            trainLayer.clearLayers();

            if (!data.records || data.records.length === 0) {
                log.innerText = "Aucun train dans cette zone.";
                return;
            }

            data.records.forEach(record => {
                const pos = record.fields.geopoint;
                const info = record.fields;

                const marker = L.circleMarker([pos[0], pos[1]], {
                    radius: 8,
                    fillColor: "#ffec00",
                    color: "#000",
                    weight: 1,
                    fillOpacity: 1
                });

                marker.bindPopup(`
                    <div style="color:black">
                        <b>Train n°${info.train_number}</b><br>
                        Retard: ${info.delay || '0'} min<br>
                        Vitesse: ${info.speed || 'N/C'} km/h
                    </div>
                `).addTo(trainLayer);
            });

            log.innerText = `${data.records.length} trains ici`;
        } catch (e) {
            log.innerHTML = `<span class="error">Erreur API</span>`;
        }
    }

    // Rafraîchissement automatique des trains toutes les 30s sur la zone actuelle
    setInterval(() => {
        const center = map.getCenter();
        updateTrains(center.lat, center.lng);
    }, 30000);

    // Lancer un premier scan au chargement
    scanZone();

</script>
</body>
</html>
