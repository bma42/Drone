<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNCF - Lignes à proximité</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #1a1a1a; font-family: sans-serif; }
        #map { height: 100%; width: 100%; }
        .panel {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: rgba(0,0,0,0.85); color: white;
            padding: 15px; border-radius: 10px; text-align: center; width: 80%; max-width: 400px;
        }
        button {
            background: #008cff; color: white; border: none; padding: 10px 20px;
            border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px;
        }
        #status { font-size: 0.85em; color: #ccc; margin-top: 8px; }
    </style>
</head>
<body>

<div class="panel">
    <strong>Lignes Ferroviaires (Rayon 10km)</strong>
    <div id="status">En attente de votre position...</div>
    <button id="startBtn">Localiser et charger</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map').setView([46.6, 2.2], 5);
    const statusEl = document.getElementById('status');
    const startBtn = document.getElementById('startBtn');

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    startBtn.addEventListener('click', () => {
        if (!navigator.geolocation) {
            statusEl.innerText = "La géolocalisation n'est pas supportée.";
            return;
        }

        startBtn.disabled = true;
        statusEl.innerText = "Demande d'accès GPS...";

        navigator.geolocation.getCurrentPosition(position => {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;
            
            map.setView([lat, lon], 12);
            
            // Marqueur utilisateur
            L.circleMarker([lat, lon], { color: 'red', radius: 8 }).addTo(map).bindPopup("Vous êtes ici").openPopup();

            loadNearbyLines(lat, lon);
        }, err => {
            statusEl.innerText = "Erreur GPS : " + err.message;
            startBtn.disabled = false;
        });
    });

    async function loadNearbyLines(lat, lon) {
        statusEl.innerText = "Chargement des lignes (Rayon 10km)...";
        
        // Utilisation de la fonction spatial 'within_distance' de l'API SNCF
        // shape est le nom du champ géométrique, la distance est en mètres (10000m = 10km)
        const url = `https://ressources.data.sncf.com/api/explore/v2.1/catalog/datasets/lignes-par-ligne-du-reseau-ferre-national/exports/geojson?where=within_distance(shape%2C%20geom'POINT(${lon}%20${lat})'%2C%2010000m)`;

        try {
            const response = await fetch(url);
            const data = await response.json();

            if (data.features.length === 0) {
                statusEl.innerText = "Aucune ligne trouvée dans un rayon de 10km.";
            } else {
                L.geoJSON(data, {
                    style: { color: "#008cff", weight: 4, opacity: 0.8 },
                    onEachFeature: (f, layer) => {
                        layer.bindPopup("<b>Ligne :</b> " + (f.properties.libelle || "Inconnue"));
                    }
                }).addTo(map);
                
                statusEl.innerText = `${data.features.length} segment(s) de ligne chargé(s).`;
                setTimeout(() => { document.querySelector('.panel').style.display = 'none'; }, 4000);
            }
        } catch (error) {
            statusEl.innerText = "Erreur de chargement API.";
            console.error(error);
        }
    }
</script>
</body>
</html>
