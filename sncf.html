<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SNCF Radar Pro - Sylvain</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #050505; color: white; font-family: -apple-system, sans-serif; overflow: hidden; }
        #map { height: 100%; width: 100%; background: #050505; }
        .ui { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); z-index: 1000; 
              background: rgba(15, 15, 15, 0.9); padding: 12px; border-radius: 12px; text-align: center; width: 280px; 
              border: 1px solid #333; backdrop-filter: blur(10px); box-shadow: 0 4px 20px rgba(0,0,0,0.6); }
        button { background: #007aff; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; font-size: 14px; }
        #log { font-size: 10px; color: #00ffcc; margin-top: 10px; font-family: monospace; text-transform: uppercase; line-height: 1.2; }
        .legend { font-size: 9px; margin-top: 8px; display: flex; justify-content: space-around; color: #aaa; }
        .dot { height: 8px; width: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; }
    </style>
</head>
<body>

<div class="ui">
    <button id="btn">RESCANNER LA ZONE</button>
    <div id="log">SYSTÈME INITIALISÉ</div>
    <div class="legend">
        <span><span class="dot" style="background:#ffec00"></span>Train</span>
        <span><span class="dot" style="background:#007aff"></span>Gare</span>
        <span><span class="dot" style="background:#1e40af"></span>Rail</span>
    </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const API_KEY = "7e15976a-8ec1-4d46-b6a0-575b8a523cdd";
    const map = L.map('map', { zoomControl: false, tap: false }).setView([48.85, 2.34], 12);
    
    const railLayer = L.layerGroup().addTo(map);
    const gareLayer = L.layerGroup().addTo(map);
    const trainLayer = L.layerGroup().addTo(map);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    async function scan() {
        const c = map.getCenter();
        log.innerText = "CONNEXION SÉCURISÉE...";

        const authHeader = 'Basic ' + btoa(API_KEY + ':');

        // 1. RAILS (Infrastructure)
        fetch(`https://ressources.data.sncf.com/api/records/1.0/search/?dataset=formes-des-lignes-du-rfn&rows=100&geofilter.distance=${c.lat},${c.lng},15000`)
            .then(res => res.json())
            .then(data => {
                railLayer.clearLayers();
                if (data.records) {
                    data.records.forEach(r => {
                        L.geoJSON(r.fields.geo_shape, { style: { color: "#1e40af", weight: 2, opacity: 0.4 } }).addTo(railLayer);
                    });
                }
            });

        // 2. GARES (Stop Points - On demande 100 points max)
        const garesUrl = `https://api.sncf.com/v1/coverage/sncf/coords/${c.lng};${c.lat}/places_nearby?type[]=stop_point&distance=20000&count=100`;
        
        try {
            const resGares = await fetch(garesUrl, { headers: { 'Authorization': authHeader } });
            const dataGares = await resGares.json();
            gareLayer.clearLayers();

            if (dataGares.places_nearby) {
                dataGares.places_nearby.forEach(p => {
                    const coord = p.stop_point.coord;
                    L.circleMarker([coord.lat, coord.lon], {
                        radius: 4, fillColor: "#007aff", color: "#fff", weight: 1, fillOpacity: 0.8
                    }).addTo(gareLayer).bindPopup(`<b>Gare : ${p.name}</b>`);
                });
            }

            // 3. TRAINS (Vehicles - Tracking dynamique)
            // On définit une zone de 0.5 degré autour du centre
            const vUrl = `https://api.sncf.com/v1/coverage/sncf/vehicles?bbox=${c.lng-0.5};${c.lat-0.5};${c.lng+0.5};${c.lat+0.5}`;
            const resTrains = await fetch(vUrl, { headers: { 'Authorization': authHeader } });
            const dataTrains = await resTrains.json();
            trainLayer.clearLayers();

            let trainCount = 0;
            if (dataTrains.vehicles) {
                dataTrains.vehicles.forEach(v => {
                    if (v.position) {
                        trainCount++;
                        L.circleMarker([v.position.lat, v.position.lon], {
                            radius: 9, fillColor: "#ffec00", color: "#000", weight: 2, fillOpacity: 1
                        }).addTo(trainLayer).bindPopup(`<b>TRAIN : ${v.label}</b><br>Direction : ${v.direction.name}`);
                    }
                });
            }

            log.innerHTML = `<span style="color:#34c759">●</span> ${trainCount} TRAINS & ${dataGares.places_nearby.length} GARES`;

        } catch (e) {
            log.innerHTML = `<span style="color:#ff3b30">ERREUR D'AUTHENTIFICATION</span>`;
        }
    }

    document.getElementById('btn').onclick = () => {
        navigator.geolocation.getCurrentPosition(p => {
            map.setView([p.coords.latitude, p.coords.longitude], 12);
            scan();
        }, () => scan());
    };

    map.on('moveend', scan);
    setInterval(scan, 30000); // Mise à jour auto toutes les 30s
    scan();
</script>
</body>
</html>
