<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNCF Radar - Final Fix</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #0f0f0f; color: white; font-family: sans-serif; overflow: hidden; }
        #map { height: 100%; width: 100%; background: #0f0f0f; }
        .ui { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); z-index: 1000; 
              background: rgba(30, 30, 30, 0.9); padding: 15px; border-radius: 12px; text-align: center; width: 280px; 
              border: 1px solid #444; box-shadow: 0 4px 20px rgba(0,0,0,0.8); backdrop-filter: blur(10px); }
        button { background: #007aff; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; font-size: 14px; }
        #log { font-size: 11px; color: #00ffcc; margin-top: 10px; font-family: 'Courier New', monospace; text-align: left; max-height: 60px; overflow-y: auto; }
        .err-msg { color: #ff4d4d; font-weight: bold; }
    </style>
</head>
<body>

<div class="ui">
    <button id="btn">LANCER LE RADAR</button>
    <div id="log">Prêt pour le scan...</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // Configuration de base
    const map = L.map('map', { zoomControl: false }).setView([46.6, 2.2], 6);
    const log = document.getElementById('log');
    const railLayer = L.layerGroup().addTo(map);
    const trainLayer = L.layerGroup().addTo(map);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    // --- FONCTION DE MISE À JOUR ---
    async function fetchData() {
        const center = map.getCenter();
        const lat = center.lat;
        const lon = center.lng;

        log.innerHTML = "📡 Requête en cours...";

        // 1. SCAN DES RAILS (Si zoom assez proche)
        if (map.getZoom() >= 10) {
            try {
                // Utilisation de l'endpoint v2.1 strict
                const railUrl = `https://ressources.data.sncf.com/api/explore/v2.1/catalog/datasets/formes-des-lignes-du-rfn/records?where=within_distance(geo_shape%2C%20geom'POINT(${lon}%20${lat})'%2C%2015km)&limit=100`;
                const resRail = await fetch(railUrl);
                if (!resRail.ok) throw new Error(`Rails: ${resRail.status}`);
                const dataRail = await resRail.json();
                
                railLayer.clearLayers();
                dataRail.results.forEach(r => {
                    L.geoJSON(r.geo_shape, { style: { color: "#1e40af", weight: 2, opacity: 0.6 } }).addTo(railLayer);
                });
            } catch (e) { console.warn(e.message); }
        }

        // 2. SCAN DES TRAINS (Temps Réel)
        try {
            // URL corrigée : Longitude d'abord dans POINT() !
            const trainUrl = `https://ressources.data.sncf.com/api/explore/v2.1/catalog/datasets/positions-temps-reel-des-trains/records?where=within_distance(geopoint%2C%20geom'POINT(${lon}%20${lat})'%2C%2050km)&limit=100`;
            
            const resTrain = await fetch(trainUrl);
            
            if (!resTrain.ok) {
                log.innerHTML = `<span class="err-msg">Erreur HTTP ${resTrain.status}</span><br>L'API refuse la connexion.`;
                return;
            }

            const dataTrain = await resTrain.json();
            trainLayer.clearLayers();

            if (!dataTrain.results || dataTrain.results.length === 0) {
                log.innerText = "Zone vide (pas de train).";
                return;
            }

            dataTrain.results.forEach(t => {
                if (t.geopoint) {
                    L.circleMarker([t.geopoint.lat, t.geopoint.lon], {
                        radius: 8, fillColor: "#ffec00", color: "#fff", weight: 2, fillOpacity: 1
                    }).addTo(trainLayer)
                      .bindPopup(`<b>Train ${t.train_number}</b><br>Vitesse: ${t.speed || 0} km/h`);
                }
            });

            log.innerText = `✅ ${dataTrain.results.length} trains trouvés.`;

        } catch (e) {
            log.innerHTML = `<span class="err-msg">Crash API: ${e.message}</span>`;
        }
    }

    // --- INTERACTIONS ---
    document.getElementById('btn').onclick = () => {
        navigator.geolocation.getCurrentPosition(pos => {
            map.setView([pos.coords.latitude, pos.coords.longitude], 12);
            fetchData();
        }, () => {
            log.innerText = "GPS refusé. Scan sur Paris...";
            map.setView([48.85, 2.34], 12);
            fetchData();
        });
    };

    // Scanner à chaque déplacement de carte
    map.on('moveend', fetchData);

    // Rafraîchissement automatique (30s)
    setInterval(fetchData, 30000);

    // Scan initial
    fetchData();

</script>
</body>
</html>
