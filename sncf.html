<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNCF Live Radar</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #0a0a0a; color: white; font-family: sans-serif; overflow: hidden; }
        #map { height: 100%; width: 100%; }
        .ui { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; 
              background: rgba(20, 20, 20, 0.9); padding: 15px; border-radius: 12px; text-align: center; width: 280px; 
              border: 1px solid #444; backdrop-filter: blur(10px); }
        button { background: #007aff; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
        #log { font-size: 11px; color: #00ffcc; margin-top: 10px; font-family: monospace; }
        .error { color: #ff4d4d !important; }
    </style>
</head>
<body>

<div class="ui">
    <button id="btn">MA POSITION / RECHARGER</button>
    <div id="log">Prêt pour le scan</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', { zoomControl: false }).setView([46.6, 2.2], 6);
    const log = document.getElementById('log');
    const railLayer = L.layerGroup().addTo(map);
    const trainLayer = L.layerGroup().addTo(map);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    // Fonction de récupération universelle v2.1
    async function updateRadar() {
        const center = map.getCenter();
        log.innerText = "Appel API SNCF...";

        // 1. Mise à jour des rails (si zoom suffisant)
        if (map.getZoom() > 10) {
            const railParams = `where=within_distance(geo_shape, geom'POINT(${center.lng} ${center.lat})', 20km)&limit=100`;
            fetch(`https://ressources.data.sncf.com/api/explore/v2.1/catalog/datasets/formes-des-lignes-du-rfn/records?${railParams}`)
                .then(res => res.json())
                .then(data => {
                    railLayer.clearLayers();
                    if (data.results) {
                        data.results.forEach(r => L.geoJSON(r.geo_shape, { style: { color: "#1e3a8a", weight: 2, opacity: 0.5 } }).addTo(railLayer));
                    }
                }).catch(() => console.log("Rail API Error"));
        }

        // 2. Mise à jour des trains (Temps réel)
        const trainParams = `where=within_distance(geopoint, geom'POINT(${center.lng} ${center.lat})', 50km)&limit=100`;
        const trainUrl = `https://ressources.data.sncf.com/api/explore/v2.1/catalog/datasets/positions-temps-reel-des-trains/records?${trainParams}`;

        try {
            const response = await fetch(trainUrl);
            if (!response.ok) throw new Error(response.status);
            
            const data = await response.json();
            trainLayer.clearLayers();

            if (!data.results || data.results.length === 0) {
                log.innerText = "Aucun train trouvé (rayon 50km)";
                return;
            }

            data.results.forEach(t => {
                if (t.geopoint) {
                    L.circleMarker([t.geopoint.lat, t.geopoint.lon], {
                        radius: 8, fillColor: "#ffec00", color: "#000", weight: 1, fillOpacity: 1
                    }).addTo(trainLayer)
                      .bindPopup(`<b>Train ${t.train_number}</b><br>Vitesse : ${t.speed || 0} km/h`);
                }
            });

            log.innerText = `${data.results.length} trains détectés`;
        } catch (e) {
            log.innerHTML = `<span class="error">API indisponible (${e.message})</span>`;
        }
    }

    // Bouton GPS
    document.getElementById('btn').onclick = () => {
        navigator.geolocation.getCurrentPosition(pos => {
            map.setView([pos.coords.latitude, pos.coords.longitude], 12);
            updateRadar();
        }, () => {
            log.innerText = "GPS refusé. Scan sur Paris...";
            map.setView([48.85, 2.34], 12);
            updateRadar();
        });
    };

    // Événements
    map.on('moveend', updateRadar);
    setInterval(updateRadar, 30000); // Auto-refresh 30s

    // Premier scan au chargement
    updateRadar();
</script>
</body>
</html>
