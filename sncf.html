<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SNCF Radar - Fix</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #map { height: 100%; width: 100%; background: #000; }
        .ui { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); z-index: 1000; 
              background: rgba(20, 20, 20, 0.9); padding: 12px; border-radius: 12px; text-align: center; width: 260px; 
              border: 1px solid #333; backdrop-filter: blur(10px); }
        button { background: #007aff; color: #fff; border: none; padding: 10px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
        #log { font-size: 10px; color: #00ffcc; margin-top: 8px; font-family: monospace; text-align: left; }
    </style>
</head>
<body>

<div class="ui">
    <button id="btn">RESCANNER</button>
    <div id="log">INIT...</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const API_KEY = "7e15976a-8ec1-4d46-b6a0-575b8a523cdd";
    const auth = 'Basic ' + btoa(API_KEY + ':');
    
    const map = L.map('map', { zoomControl: false }).setView([48.85, 2.34], 12);
    const layers = L.layerGroup().addTo(map);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    async function scan() {
        const c = map.getCenter();
        log.innerText = "CONNEXION...";

        try {
            const url = `https://api.sncf.com/v1/coverage/sncf/coords/${c.lng};${c.lat}/places_nearby?type[]=stop_point&distance=20000&count=100`;
            
            const response = await fetch(url, {
                method: 'GET',
                headers: { 'Authorization': auth }
            });

            if (!response.ok) throw new Error("Erreur " + response.status);

            const data = await response.json();
            layers.clearLayers();

            let stations = 0;
            if (data.places_nearby) {
                stations = data.places_nearby.length;
                data.places_nearby.forEach(p => {
                    const coord = p.stop_point.coord;
                    L.circleMarker([coord.lat, coord.lon], {
                        radius: 6, fillColor: "#007aff", color: "#fff", weight: 1, fillOpacity: 0.8
                    }).addTo(layers).bindPopup(`<b>${p.name}</b><br><button onclick="loadLive('${p.id}')">VOIR TRAINS</button>`);
                });
            }

            log.innerHTML = `<span style="color:#34c759">●</span> GARES : ${stations}`;

        } catch (e) {
            log.innerHTML = `<span style="color:#ff3b30">ERREUR : ${e.message}</span>`;
            console.error(e);
        }
    }

    window.loadLive = async function(id) {
        log.innerText = "CHECK DÉPARTS...";
        try {
            const res = await fetch(`https://api.sncf.com/v1/coverage/sncf/stop_areas/${id}/departures?duration=3600`, {
                headers: { 'Authorization': auth }
            });
            const data = await res.json();
            
            if (data.departures && data.departures.length > 0) {
                alert("TRAIN DÉTECTÉ : " + data.departures[0].display_informations.direction);
            } else {
                alert("AUCUN TRAIN EN MOUVEMENT ICI");
            }
        } catch(e) { alert("ERREUR LIVE"); }
    }

    document.getElementById('btn').onclick = scan;
    map.on('moveend', scan);
    scan();
</script>
</body>
</html>
