<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNCF Radar - Diagnostic</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #0a0a0a; color: white; font-family: sans-serif; }
        #map { height: 100%; width: 100%; }
        .ui { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); z-index: 1000; 
              background: rgba(25, 25, 25, 0.95); padding: 12px; border-radius: 12px; text-align: center; width: 280px; 
              border: 1px solid #444; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        button { background: #007aff; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
        #log { font-size: 11px; color: #00ffcc; margin-top: 8px; font-family: monospace; white-space: pre-wrap; }
        .error { color: #ff4d4d !important; }
    </style>
</head>
<body>

<div class="ui">
    <button id="btn">SCANNER MA ZONE</button>
    <div id="log">Initialisation...</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', { zoomControl: false }).setView([46.6, 2.2], 6);
    const log = document.getElementById('log');
    const trainLayer = L.layerGroup().addTo(map);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    // Fonction de scan principale
    async function updateTrains(lat, lon, isGlobal = false) {
        log.innerText = isGlobal ? "Scan National..." : "Scan Local (30km)...";
        
        // v2.1 syntax: POINT(LON LAT) - Très important d'inverser lat/lon ici
        let whereClause = `within_distance(geopoint, geom'POINT(${lon} ${lat})', 30000m)`;
        if(isGlobal) whereClause = "vitesse>0"; // Chercher n'importe quel train qui bouge en France

        const url = `https://ressources.data.sncf.com/api/explore/v2.1/catalog/datasets/positions-temps-reel-des-trains/records?where=${encodeURIComponent(whereClause)}&limit=100`;

        try {
            const res = await fetch(url);
            if (!res.ok) throw new Error(`Erreur HTTP: ${res.status}`);
            
            const data = await res.json();
            trainLayer.clearLayers();

            if (!data.results || data.results.length === 0) {
                if (!isGlobal) {
                    log.innerText = "Zone vide. Tentative Scan National...";
                    return updateTrains(46.6, 2.2, true); // Relance en mode global
                }
                log.innerText = "L'API SNCF ne renvoie aucun train actuellement.";
                return;
            }

            data.results.forEach(train => {
                if (train.geopoint) {
                    L.circleMarker([train.geopoint.lat, train.geopoint.lon], {
                        radius: 7, fillColor: "#ffec00", color: "#000", weight: 1, fillOpacity: 1
                    }).addTo(trainLayer)
                      .bindPopup(`Train: ${train.train_number}<br>Vitesse: ${train.speed} km/h`);
                }
            });

            log.innerText = `${data.results.length} trains trouvés ${isGlobal ? '(France)' : '(Local)'}`;
        } catch (e) {
            log.innerHTML = `<span class="error">Erreur: ${e.message}</span>`;
            console.error(e);
        }
    }

    // Interaction
    document.getElementById('btn').onclick = () => {
        navigator.geolocation.getCurrentPosition(pos => {
            const { latitude, longitude } = pos.coords;
            map.setView([latitude, longitude], 11);
            updateTrains(latitude, longitude);
        }, () => {
            log.innerText = "GPS refusé. Scan sur Paris...";
            updateTrains(48.85, 2.34);
        });
    };

    // Scan au mouvement
    map.on('moveend', () => {
        const c = map.getCenter();
        updateTrains(c.lat, c.lng);
    });

    // Premier lancement sur le centre par défaut
    updateTrains(46.6, 2.2);
</script>
</body>
</html>
