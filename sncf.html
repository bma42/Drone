<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNCF Radar Fix</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #050505; color: white; font-family: sans-serif; overflow: hidden; }
        #map { height: 100%; width: 100%; }
        .ui { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); z-index: 1000; 
              background: rgba(15, 15, 15, 0.9); padding: 12px; border-radius: 12px; text-align: center; width: 260px; 
              border: 1px solid #333; backdrop-filter: blur(8px); }
        button { background: #007aff; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
        #log { font-size: 10px; color: #00ffcc; margin-top: 8px; font-family: monospace; }
        .error { color: #ff3b30 !important; }
    </style>
</head>
<body>

<div class="ui">
    <button id="btn">MA POSITION / RECHARGER</button>
    <div id="log">SYSTÈME OPÉRATIONNEL</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', { zoomControl: false }).setView([48.85, 2.34], 12);
    const railLayer = L.layerGroup().addTo(map);
    const trainLayer = L.layerGroup().addTo(map);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    const BASE_URL = "https://ressources.data.sncf.com/api/explore/v2.1/catalog/datasets";

    async function updateRadar() {
        const c = map.getCenter();
        log.innerText = "SYNCHRONISATION...";

        try {
            if (map.getZoom() > 10) {
                const railUrl = `${BASE_URL}/formes-des-lignes-du-rfn/records?where=within_distance(geo_shape, geom'POINT(${c.lng} ${c.lat})', 15km)&limit=100`;
                const railRes = await fetch(railUrl);
                if (railRes.ok) {
                    const railData = await railRes.json();
                    railLayer.clearLayers();
                    railData.results.forEach(r => {
                        if (r.geo_shape) L.geoJSON(r.geo_shape, { style: { color: "#1e3a8a", weight: 2, opacity: 0.5 } }).addTo(railLayer);
                    });
                }
            }

            const trainUrl = `${BASE_URL}/positions-temps-reel-des-trains/records?where=within_distance(geopoint, geom'POINT(${c.lng} ${c.lat})', 50km)&limit=100`;
            const trainRes = await fetch(trainUrl);
            
            if (!trainRes.ok) {
                if(trainRes.status === 404) throw new Error("DATASET TRAINS INTROUVABLE (404)");
                throw new Error("ERREUR " + trainRes.status);
            }

            const trainData = await trainRes.json();
            trainLayer.clearLayers();

            if (!trainData.results || trainData.results.length === 0) {
                log.innerText = "LIGNES OK - AUCUN TRAIN DÉTECTÉ";
                return;
            }

            trainData.results.forEach(t => {
                if (t.geopoint) {
                    L.circleMarker([t.geopoint.lat, t.geopoint.lon], {
                        radius: 7, fillColor: "#ffec00", color: "#000", weight: 1, fillOpacity: 1
                    }).addTo(trainLayer).bindPopup(`Train ${t.train_number}`);
                }
            });

            log.innerText = `LIGNES OK - ${trainData.results.length} TRAINS`;
        } catch (e) {
            log.innerHTML = `<span class="error">${e.message}</span>`;
        }
    }

    document.getElementById('btn').onclick = () => {
        navigator.geolocation.getCurrentPosition(p => {
            map.setView([p.coords.latitude, p.coords.longitude], 12);
            updateRadar();
        }, () => updateRadar());
    };

    map.on('moveend', updateRadar);
    setInterval(updateRadar, 30000);
    updateRadar();
</script>
</body>
</html>
