<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNCF Localizer</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #121212; color: white; font-family: sans-serif; }
        #map { height: 100%; width: 100%; z-index: 1; }
        .ui { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); z-index: 1000; 
              background: rgba(25,25,25,0.9); padding: 20px; border-radius: 12px; text-align: center; width: 300px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        button { background: #008cff; color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; }
        #log { font-size: 0.8em; color: #888; margin-top: 10px; line-height: 1.4; }
        .error { color: #ff4d4d !important; }
    </style>
</head>
<body>

<div class="ui">
    <strong>Radar Ferroviaire (10km)</strong>
    <div id="log">Cliquez pour activer le radar</div>
    <button id="btn">ACTIVER GPS</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', { zoomControl: false }).setView([46.6, 2.2], 5);
    const log = document.getElementById('log');
    const btn = document.getElementById('btn');

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    btn.onclick = () => {
        log.innerText = "Recherche satellite...";
        if (!navigator.geolocation) return error("GPS non supporté");

        navigator.geolocation.getCurrentPosition(pos => {
            const { latitude, longitude } = pos.coords;
            map.setView([latitude, longitude], 13);
            L.circleMarker([latitude, longitude], { color: 'cyan', radius: 6 }).addTo(map);
            loadData(latitude, longitude);
        }, err => {
            if (location.protocol !== 'https:') {
                error("ERREUR : HTTPS obligatoire pour le GPS");
            } else {
                error("GPS refusé ou indisponible");
            }
        }, { enableHighAccuracy: true });
    };

    async function loadData(lat, lon) {
        log.innerText = "Interrogation SNCF...";
        
        // Nouvelle URL utilisant l'API de recherche (plus robuste que l'export)
        const dataset = "lignes-par-ligne-du-reseau-ferre-national";
        const query = `within_distance(shape, geom'POINT(${lon} ${lat})', 10000m)`;
        const url = `https://ressources.data.sncf.com/api/explore/v2.1/catalog/datasets/${dataset}/records?where=${encodeURIComponent(query)}&limit=50`;

        try {
            const response = await fetch(url);
            if (!response.ok) throw new Error("Serveur SNCF (Code " + response.status + ")");
            
            const data = await response.json();
            
            if (!data.results || data.results.length === 0) {
                log.innerText = "Aucune ligne à moins de 10km.";
                return;
            }

            data.results.forEach(record => {
                L.geoJSON(record.shape, {
                    style: { color: "#00ccff", weight: 4, opacity: 0.8 }
                }).addTo(map);
            });

            log.innerText = data.results.length + " lignes détectées.";
            btn.style.display = "none";
        } catch (e) {
            error(e.message);
        }
    }

    function error(msg) {
        log.innerText = msg;
        log.classList.add('error');
    }
</script>
</body>
</html>
